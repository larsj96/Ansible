---
monitoring_stack_dir: "/opt/monitoring"
monitoring_timezone: "Europe/Oslo"

influxdb_username: "admin"
influxdb_org: "lanilsen"
influxdb_bucket: "homelab"
influxdb_retention: "30d"

opensearch_initial_admin_password: "ChangeMe-Set-In-Ansible-Vault"
grafana_admin_password: "ChangeMe-Set-In-Ansible-Vault"

telegraf_influxdb_url: "http://127.0.0.1:8086"
telegraf_influxdb_org: "{{ influxdb_org }}"
telegraf_influxdb_bucket: "{{ influxdb_bucket }}"
telegraf_ping_targets:
  - "1.1.1.1"
telegraf_x509_targets:
  - "https://docs.lanilsen.com:443"

monitoring_cloudflare_enabled: false
monitoring_cloudflare_api_token: "{{ cloudflare_api_token | default('') }}"
monitoring_cloudflare_accounts: []
monitoring_cloudflare_zones: []
monitoring_cloudflare_excluded_zones: []
monitoring_cloudflare_free_tier: false
monitoring_cloudflare_container_image: "ghcr.io/lablabs/cloudflare_exporter:0.2.3"
monitoring_cloudflare_container_port: "8081"
monitoring_cloudflare_scrape_interval: "60"
monitoring_cloudflare_scrape_delay: "300"
monitoring_cloudflare_timeout_seconds: "10"
monitoring_cloudflare_telegraf_response_timeout: "60s"

monitoring_docker_socket_gid: "112"
monitoring_proxmox_enabled: false
monitoring_proxmox_api_token: "{{ proxmox_api_token | default('') }}"
monitoring_proxmox_targets: []
monitoring_snmp_enabled: false
monitoring_snmp_community: "{{ snmp_community | default('') }}"
monitoring_snmp_targets: []
monitoring_fortigate_snmp_enabled: false
monitoring_fortigate_snmp_targets: []
monitoring_fortigate_snmp_interfaces: []
monitoring_ilo_temperature_sensors: []
monitoring_ilo_fans: []
monitoring_ilo_power_supplies: []
monitoring_ilo_storage_batteries: []
