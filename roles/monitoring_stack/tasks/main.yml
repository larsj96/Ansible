---
- name: Require monitoring secrets
  ansible.builtin.assert:
    that:
      - influxdb_admin_password is defined
      - influxdb_admin_token is defined
      - opensearch_initial_admin_password is defined
      - grafana_admin_password is defined
      - influxdb_admin_password | length >= 16
      - influxdb_admin_token | length >= 32
      - opensearch_initial_admin_password != "ChangeMe-Set-In-Ansible-Vault"
      - grafana_admin_password != "ChangeMe-Set-In-Ansible-Vault"
      - not (monitoring_proxmox_enabled | bool) or (monitoring_proxmox_api_token is defined and monitoring_proxmox_api_token | length > 20)
      - not (monitoring_snmp_enabled | bool) or (monitoring_snmp_community is defined and monitoring_snmp_community | length > 0)
      - not (monitoring_cloudflare_enabled | bool) or (monitoring_cloudflare_api_token is defined and monitoring_cloudflare_api_token | length > 20)
    fail_msg: "Define monitoring secrets with Ansible Vault or an ignored vars file before deploying."
  no_log: true

- name: Create monitoring stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ monitoring_stack_dir }}"
    - "{{ monitoring_stack_dir }}/telegraf"
    - "{{ monitoring_stack_dir }}/grafana"
    - "{{ monitoring_stack_dir }}/grafana/provisioning"
    - "{{ monitoring_stack_dir }}/grafana/provisioning/alerting"
    - "{{ monitoring_stack_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_stack_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_stack_dir }}/grafana/provisioning/plugins"
    - "{{ monitoring_stack_dir }}/grafana/dashboards"
    - "{{ monitoring_stack_dir }}/grafana/dashboards/homelab"
    - "{{ monitoring_stack_dir }}/logstash"
    - "{{ monitoring_stack_dir }}/logstash/pipeline"

- name: Install monitoring compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_stack_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Install central Telegraf config
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: "{{ monitoring_stack_dir }}/telegraf/telegraf.conf"
    owner: root
    group: root
    mode: "0644"

- name: Install Logstash pipeline
  ansible.builtin.template:
    src: logstash.conf.j2
    dest: "{{ monitoring_stack_dir }}/logstash/pipeline/homelab.conf"
    owner: root
    group: root
    mode: "0644"

- name: Install Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ monitoring_stack_dir }}/grafana/provisioning/datasources/homelab.yml"
    owner: root
    group: root
    mode: "0644"
  no_log: true

- name: Install Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provider.yml.j2
    dest: "{{ monitoring_stack_dir }}/grafana/provisioning/dashboards/homelab.yml"
    owner: root
    group: root
    mode: "0644"

- name: Install Grafana dashboards
  ansible.builtin.template:
    src: "{{ item }}"
    dest: "{{ monitoring_stack_dir }}/grafana/dashboards/homelab/{{ item | basename | regex_replace('^grafana-dashboard-', '') | regex_replace('\\.j2$', '') }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - grafana-dashboard-homelab-overview.json.j2
    - grafana-dashboard-network-tls.json.j2
    - grafana-dashboard-ilo-health.json.j2
    - grafana-dashboard-fortigate-health.json.j2
    - grafana-dashboard-paloalto-panograf.json.j2
    - grafana-dashboard-proxmox-ve.json.j2

- name: Install Cloudflare Grafana dashboard
  ansible.builtin.template:
    src: grafana-dashboard-cloudflare.json.j2
    dest: "{{ monitoring_stack_dir }}/grafana/dashboards/homelab/cloudflare.json"
    owner: root
    group: root
    mode: "0644"
  when: monitoring_cloudflare_enabled | bool

- name: Install Palo Alto SNMP dashboard
  ansible.builtin.copy:
    src: grafana/dashboards/palo-alto-snmp.json
    dest: "{{ monitoring_stack_dir }}/grafana/dashboards/homelab/palo-alto-snmp.json"
    owner: root
    group: root
    mode: "0644"

- name: Install full Palo Alto PAN-OS dashboard
  ansible.builtin.copy:
    src: grafana/dashboards/paloalto-panos-firewall-19945.json
    dest: "{{ monitoring_stack_dir }}/grafana/dashboards/homelab/paloalto-panos-firewall-19945.json"
    owner: root
    group: root
    mode: "0644"

- name: Install monitoring env file
  ansible.builtin.copy:
    dest: "{{ monitoring_stack_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
    content: |
      TZ={{ monitoring_timezone }}
      INFLUXDB_ADMIN_PASSWORD={{ influxdb_admin_password }}
      INFLUXDB_ADMIN_TOKEN={{ influxdb_admin_token }}
      OPENSEARCH_INITIAL_ADMIN_PASSWORD={{ opensearch_initial_admin_password }}
      GRAFANA_ADMIN_PASSWORD={{ grafana_admin_password }}
      CLOUDFLARE_API_TOKEN={{ monitoring_cloudflare_api_token }}
      CLOUDFLARE_ACCOUNTS={{ monitoring_cloudflare_accounts | default([]) | join(',') }}
      CLOUDFLARE_ZONES={{ monitoring_cloudflare_zones | default([]) | join(',') }}
      CLOUDFLARE_EXCLUDE_ZONES={{ monitoring_cloudflare_excluded_zones | default([]) | join(',') }}
      CLOUDFLARE_FREE_TIER={{ monitoring_cloudflare_free_tier | ternary('true','false') }}
      PROXMOX_API_TOKEN={{ monitoring_proxmox_api_token }}
  no_log: true

- name: Start monitoring stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ monitoring_stack_dir }}"
  changed_when: true

- name: Restart Grafana, Logstash, and Telegraf after provisioning changes
  ansible.builtin.command:
    cmd: docker compose restart {% if monitoring_cloudflare_enabled %}grafana logstash telegraf cloudflare-exporter{% else %}grafana logstash telegraf{% endif %}
    chdir: "{{ monitoring_stack_dir }}"
  changed_when: true
