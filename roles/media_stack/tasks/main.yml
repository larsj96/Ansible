---
- name: Install media stack packages
  ansible.builtin.apt:
    name:
      - nfs-common
      - e2fsprogs
    state: present
    update_cache: true

- name: Require NFS source when media NFS is enabled
  ansible.builtin.assert:
    that:
      - media_nfs_src | length > 0
    fail_msg: "Set media_nfs_src before enabling the media NFS mount."
  when: media_nfs_enabled | bool

- name: Create media stack directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_puid }}"
    group: "{{ media_pgid }}"
    mode: "0775"
  loop:
    - "{{ media_stack_dir }}"
    - "{{ media_config_dir }}"
    - "{{ media_config_dir }}/plex"
    - "{{ media_config_dir }}/sonarr"
    - "{{ media_config_dir }}/radarr"
    - "{{ media_config_dir }}/prowlarr"
    - "{{ media_config_dir }}/jackett"
    - "{{ media_config_dir }}/qbittorrent"
    - "{{ media_config_dir }}/deluge"
    - "{{ media_config_dir }}/overseerr"
    - "{{ media_config_dir }}/ombi"
    - "{{ media_config_dir }}/unpackerr"
    - "{{ media_downloads_dir }}"
    - "{{ media_completed_downloads_dir }}"
    - "{{ media_incomplete_downloads_dir }}"

- name: Ensure media library mount point exists
  ansible.builtin.file:
    path: "{{ media_library_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Mount media library from NFS when enabled
  ansible.posix.mount:
    path: "{{ media_library_dir }}"
    src: "{{ media_nfs_src }}"
    fstype: nfs
    opts: "{{ media_nfs_opts }}"
    state: mounted
  when: media_nfs_enabled | bool

- name: Wait for media data disk
  ansible.builtin.stat:
    path: "{{ media_data_disk_device }}"
  register: media_data_disk_stat
  retries: 12
  delay: 5
  until: media_data_disk_stat.stat.exists
  when: media_data_disk_enabled | bool

- name: Check media data disk filesystem
  ansible.builtin.command:
    cmd: "blkid -o value -s TYPE {{ media_data_disk_device }}"
  register: media_data_disk_blkid
  changed_when: false
  failed_when: false
  when: media_data_disk_enabled | bool

- name: Create filesystem on media data disk
  ansible.builtin.command:
    cmd: "mkfs.{{ media_data_disk_fstype }} -F {{ media_data_disk_device }}"
  changed_when: true
  when:
    - media_data_disk_enabled | bool
    - media_data_disk_blkid.rc != 0

- name: Read media data disk UUID
  ansible.builtin.command:
    cmd: "blkid -o value -s UUID {{ media_data_disk_device }}"
  register: media_data_disk_uuid
  changed_when: false
  when: media_data_disk_enabled | bool

- name: Mount local media data disk when enabled
  ansible.posix.mount:
    path: "{{ media_library_dir }}"
    src: "UUID={{ media_data_disk_uuid.stdout }}"
    fstype: "{{ media_data_disk_fstype }}"
    opts: "{{ media_data_disk_mount_opts }}"
    state: mounted
  when: media_data_disk_enabled | bool

- name: Create media library directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ media_puid }}"
    group: "{{ media_pgid }}"
    mode: "0775"
  loop:
    - "{{ media_library_dir }}"
    - "{{ media_movies_dir }}"
    - "{{ media_tv_dir }}"
  when: media_create_local_library_dirs | bool or media_nfs_enabled | bool or media_data_disk_enabled | bool

- name: Install media compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ media_stack_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: Install media env file
  ansible.builtin.template:
    src: media.env.j2
    dest: "{{ media_stack_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Start media stack
  ansible.builtin.command:
    cmd: docker compose up -d
    chdir: "{{ media_stack_dir }}"
  changed_when: true
