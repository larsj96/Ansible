---
- name: Install Docker prerequisites
  ansible.builtin.apt:
    name: "{{ docker_host_packages }}"
    state: present
    update_cache: true

- name: Install Docker Engine from Ubuntu packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Ensure docker service is enabled and running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add ubuntu user to docker group
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
