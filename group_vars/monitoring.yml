---
monitoring_stack_dir: "/opt/monitoring"
monitoring_timezone: "Europe/Oslo"

influxdb_username: "admin"
influxdb_org: "lanilsen"
influxdb_bucket: "homelab"
influxdb_retention: "30d"

opensearch_initial_admin_password: "ChangeMe-Set-In-Ansible-Vault"
grafana_admin_password: "ChangeMe-Set-In-Ansible-Vault"

telegraf_influxdb_url: "http://10.0.0.38:8086"
telegraf_influxdb_org: "{{ influxdb_org }}"
telegraf_influxdb_bucket: "{{ influxdb_bucket }}"

telegraf_ping_targets:
  - "10.0.0.1"
  - "10.0.0.33"
  - "10.0.0.37"
  - "10.0.0.99"
  - "10.0.0.161"
  - "10.0.0.162"
  - "10.0.0.163"
  - "10.0.0.164"
  - "10.0.0.165"
  - "10.0.124.162"
  - "10.0.124.163"
  - "10.0.124.164"
  - "10.0.124.165"
  - "1.1.1.1"

telegraf_x509_targets:
  - "https://docs.lanilsen.com:443"
  - "https://10.0.0.162:8006"
  - "https://10.0.124.162:443"
  - "https://10.0.124.163:443"
  - "https://10.0.124.164:443"
  - "https://10.0.124.165:443"

monitoring_proxmox_enabled: true
monitoring_proxmox_api_token: "{{ proxmox_api_token | default('') }}"
monitoring_proxmox_targets:
  - name: "hp1"
    base_url: "https://10.0.0.162:8006/api2/json"
  - name: "hp2"
    base_url: "https://10.0.0.163:8006/api2/json"
  - name: "hp3"
    base_url: "https://10.0.0.164:8006/api2/json"

monitoring_snmp_enabled: false
monitoring_snmp_community: "{{ snmp_community | default('') }}"
monitoring_snmp_targets:
  - name: "idrac-r820"
    address: "10.0.124.162"
    device_type: "dell-idrac"
  - name: "ilo-hp3"
    address: "10.0.124.163"
    device_type: "hp-ilo"
  - name: "ilo-hp1"
    address: "10.0.124.164"
    device_type: "hp-ilo"
  - name: "ilo-hp2"
    address: "10.0.124.165"
    device_type: "hp-ilo"
  - name: "fortigate-services"
    address: "10.0.0.33"
    device_type: "fortigate"
  - name: "fortigate-proxmox-mgmt"
    address: "10.0.0.161"
    device_type: "fortigate"
